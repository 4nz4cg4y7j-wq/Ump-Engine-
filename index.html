<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UmpireSystem</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    background: #111827;
}

.logo {
    font-size: 20px;
    font-weight: bold;
}

.nav-links a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    font-size: 14px;
    opacity: 0.85;
}

.nav-links a:hover {
    opacity: 1;
}

.cta-btn {
    background: #3b82f6;
    padding: 8px 14px;
    border-radius: 6px;
    color: white;
}

/* HERO */
.hero {
    text-align: center;
    padding: 90px 20px;
}

.hero h1 {
    font-size: 42px;
    margin-bottom: 10px;
}

.hero p {
    opacity: 0.8;
    margin-bottom: 25px;
}

.btn {
    padding: 12px 18px;
    margin: 8px;
    border: none;
    cursor: pointer;
    border-radius: 6px;
}

.primary {
    background: #3b82f6;
    color: white;
}

.secondary {
    background: #1f2937;
    color: white;
    border: 1px solid #374151;
}

/* SECTIONS */
.section {
    text-align: center;
    padding: 60px 20px;
}

.card {
    display: inline-block;
    background: #1f2937;
    padding: 20px;
    margin: 10px;
    border-radius: 10px;
    width: 200px;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav>
    <div class="logo">🏟️ UmpireSystem</div>

    <div class="nav-links">
        <a href="/features">Features</a>
        <a href="/pricing">Pricing</a>
        <a href="/login">Login</a>
        <a class="cta-btn" href="/register">Get Started</a>
    </div>
</nav>

<!-- HERO -->
<div class="hero">
    <h1>Assign Games. Manage Umpires. Stay Organized.</h1>
    <p>A simple platform for sports assigners and officiating crews.</p>

    <button class="btn primary" onclick="location.href='/register'">
        Create Account
    </button>

    <button class="btn secondary" onclick="location.href='/login'">
        Login
    </button>
</div>

<!-- FEATURES -->
<div class="section">
    <h2>Features</h2>

    <div class="card">Assign Games</div>
    <div class="card">Manage Groups</div>
    <div class="card">Track Schedule</div>
</div>

<!-- PRICING PREVIEW -->
<div class="section">
    <h2>Plans</h2>

    <div class="card">$5 Assign Only</div>
    <div class="card">$7 AI Engine</div>
    <div class="card">$10 Full Platform</div>
</div>

<!-- CTA -->
<div class="section">
    <h2>Get started in minutes</h2>

    <button class="btn primary" onclick="location.href='/register'">
        Start Now
    </button>
</div>

</body>
</html>
